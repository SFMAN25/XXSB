<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XXSB PRO | منصة الألعاب الحية</title>
    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; background: #131a26; padding: 25px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,255,204,0.2); border: 1px solid #1f2d42; }
        h2, h3 { color: #00ffcc; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #1f2d42; background: #0b0f19; color: #fff; text-align: center; font-size: 16px; }
        input:focus { border-color: #00ffcc; outline: none; }
        button { width: 95%; padding: 12px; background: #00ffcc; color: #0b0f19; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #00b38f; box-shadow: 0 0 10px #00ffcc; }
        .hidden { display: none; }
        .live-feed { background: #0b0f19; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #00ffcc; height: 120px; overflow: hidden; }
        .feed-item { padding: 6px; border-bottom: 1px solid #1f2d42; font-size: 14px; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .info-box { background: #1d2736; padding: 10px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #00ffcc; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-screen">
            <h2>إنشاء حساب جديد 🔥</h2>
            <input type="email" id="reg-email" placeholder="البريد الإلكتروني للعب" required>
            <input type="password" id="reg-pass" placeholder="كلمة المرور" required>
            <input type="text" id="reg-ref" placeholder="كود الإحالة (اختياري)">
            <button id="btn-register">تسجيل الحساب وابدأ اللعب</button>
        </div>

        <div id="dashboard-screen" class="hidden">
            <h2>مرحباً بك في المنصة 🎉</h2>
            <div class="info-box">
                <p>حسابك: <span id="user-email" style="color: #00ffcc;">-</span></p>
                <h3>رصيدك الحالي: <span id="user-balance" style="color: #ffcc00;">0</span> ج.م</h3>
            </div>
            
            <div class="info-box">
                <p>كود الإحالة الخاص بك مشاركته تعطيك بونص:</p>
                <strong id="user-ref-code" style="font-size: 18px; color: #00ffcc; letter-spacing: 2px;">-</strong>
            </div>

            <div style="margin: 30px 0; padding: 20px; background: #0b0f19; border-radius: 10px; border: 1px dashed #1f2d42;">
                🟢 نظام تحدي مضاعفة الرصيد (X-O) جاهز للعب بـ 5000 ج.م والربح دبل!
                <button style="margin-top: 15px; background: #ffcc00; color: #000;">ابدأ اللعب الآن 🎮</button>
            </div>
        </div>

        <div class="live-feed">
            <h4 style="margin: 0 0 10px 0; color: #00ffcc;">🔥 عمليات حية بالمنصة الآن</h4>
            <div id="live-operations"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // الـ Config الخاص بمشروعك xxsb-6bd79
        const firebaseConfig = {
            apiKey: "ضع_هنا_الـ_API_KEY_الخاص_بك",
            authDomain: "xxsb-6bd79.firebaseapp.com",
            projectId: "xxsb-6bd79",
            storageBucket: "xxsb-6bd79.appspot.com",
            messagingSenderId: "ضع_هنا_الـ_SENDER_ID",
            appId: "ضع_هنا_الـ_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // دالة تتبع الـ IP والشبكة والجهاز للمستخدم
        async function fetchNetworkData() {
            try {
                let response = await fetch('https://ipapi.co/json/');
                let data = await response.json();
                return {
                    ip: data.ip || "غير معروف",
                    network: data.org || "غير معروف",
                    device: navigator.userAgent.includes("Mobile") ? "موبايل" : "كمبيوتر / لابتوب"
                };
            } catch (e) {
                return { ip: "مخفي/محظور", network: "غير معروف", device: "متصفح آمن" };
            }
        }

        // دالة التسجيل ونظام الإحالات المتكامل
        document.getElementById('btn-register').addEventListener('click', async () => {
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-pass').value.trim();
            const refInput = document.getElementById('reg-ref').value.trim().toUpperCase();

            if(!email || !password) return alert("برجاء ملء البيانات كاملة!");

            try {
                // 1. جلب بيانات جهاز المستخدم وشبكته فوراً
                const netData = await fetchNetworkData();

                // 2. إنشاء الحساب في الـ Authentication
                const credential = await createUserWithEmailAndPassword(auth, email, password);
                const user = credential.user;

                // 3. توليد كود إحالة فريد خاص باللاعب الجديد
                const newRefCode = "XXSB-" + Math.random().toString(36).substring(2, 8).toUpperCase();

                // 4. التحقق من كود الإحالة المدخل إذا وجد لمنح الـ 1000 ج.م
                let referrerUid = null;
                if(refInput) {
                    const q = query(collection(db, "users"), where("referralCode", "==", refInput));
                    const querySnap = await getDocs(q);
                    if(!querySnap.empty) {
                        const referrerDoc = querySnap.docs[0];
                        referrerUid = referrerDoc.id;
                        // إضافة بونص 1000 ج.م للشخص الذي قام بالإحالة
                        await updateDoc(doc(db, "users", referrerUid), {
                            balance: increment(1000)
                        });
                    }
                }

                // 5. حفظ بيانات اللاعب كاملة بالبونص (5000 ج.م) في الـ Database
                await setDoc(doc(db, "users", user.uid), {
                    email: email,
                    balance: 5000, 
                    referralCode: newRefCode,
                    referredBy: referrerUid,
                    ipAddress: netData.ip,
                    networkProvider: netData.network,
                    deviceType: netData.device,
                    joinedAt: new Date()
                });

                alert("تم التسجيل بنجاح وحصلت على بونص 5000 ج.م!");

            } catch (err) {
                alert("حدث خطأ أثناء التسجيل: " + err.message);
            }
        });

        // مراقبة حالة اللاعب وتحديث الشاشة والرصيد لايف
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if(userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('user-email').innerText = data.email;
                    document.getElementById('user-balance').innerText = data.balance;
                    document.getElementById('user-ref-code').innerText = data.referralCode;
                }
            }
        });

        // تشغيل شاشة العمليات الوهمية/الحية لزيادة حماس اللاعبين
        const players = ["بودا_الزعيم", "Mido_2026", "Alex_King", "Sayed_Fx", "Mariam_Bet", "Kms_User"];
        const actions = ["كسب الضعف في XO 🔥", "سحب أرباح لكاش 💸", "أودع رصيد جديد 💳", "حصل على بونص الإحالة 🚀"];
        setInterval(() => {
            const feed = document.getElementById('live-operations');
            const p = players[Math.floor(Math.random() * players.length)];
            const a = actions[Math.floor(Math.random() * actions.length)];
            const amount = Math.floor(Math.random() * 5000) + 1000;
            
            const item = document.createElement('div');
            item.className = 'feed-item';
            item.innerHTML = `اللاعب <span style="color:#ffcc00">${p}</span> ${a} بقيمة <span style="color:#00ffcc">${amount} ج.م</span>`;
            
            feed.prepend(item);
            if(feed.children.length > 4) feed.lastChild.remove();
        }, 3000);
    </script>
</body>
</html>
