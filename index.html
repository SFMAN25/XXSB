<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XXSB PRO - لوحة تحكم اللاعب</title>
    <style>
        /* ================= 🎨 Cyberpunk Dark Luxury Style ================= */
        body {
            background-color: #080a0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; box-sizing: border-box;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .logo-highlight { color: #ff3e3e; text-shadow: 0 0 15px #ff3e3e; }
        
        .auth-box {
            background: #121620; border: 1px solid #ff3e3e; padding: 40px 30px;
            border-radius: 16px; max-width: 420px; margin: 70px auto;
            box-shadow: 0 0 25px rgba(255, 62, 62, 0.2); text-align: center;
        }
        .app-logo {
            width: 110px; height: 110px; border-radius: 50%; object-fit: cover;
            box-shadow: 0 0 25px rgba(255, 62, 62, 0.6); border: 2px solid #ff3e3e; margin-bottom: 15px;
        }
        .auth-tabs { display: flex; background: #080a0f; border-radius: 8px; padding: 5px; margin-bottom: 25px; border: 1px solid #30363d; }
        .auth-tab { flex: 1; padding: 12px; background: transparent; color: #8b949e; border: none; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .auth-tab.active { background: #ff3e3e; color: white; border-radius: 6px; box-shadow: 0 0 10px rgba(255, 62, 62, 0.5); }

        .auth-box input, .finance-inputs input {
            width: 100%; padding: 14px; margin: 10px 0; background: #080a0f; border: 1px solid #30363d; color: white; border-radius: 8px; text-align: center; font-size: 16px; box-sizing: border-box; transition: 0.3s;
        }
        .auth-box input:focus { border-color: #ff3e3e; box-shadow: 0 0 8px rgba(255, 62, 62, 0.5); outline: none; }

        button { cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 15px; transition: 0.2s ease-in-out; }
        .btn-submit { width: 100%; background: #00ff66; color: #080a0f; border: none; padding: 14px; margin-top: 10px; }
        .btn-submit:hover { background: #00cc52; transform: translateY(-2px); }

        /* الواجهة الرئيسية */
        .user-bar {
            display: flex; justify-content: space-between; align-items: center; background: #121620; padding: 15px 25px; border-radius: 12px; margin-top: 20px; margin-bottom: 30px; border: 1px solid #ff3e3e;
        }
        .user-info { display: flex; align-items: center; gap: 12px; font-weight: bold; }
        .user-bar-logo { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #ff3e3e; }
        .btn-small { background: #ff3e3e; color: white; border: none; padding: 10px 20px; font-size: 14px; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #121620; border: 1px solid #30363d; padding: 22px; border-radius: 14px; text-align: center; }
        .stat-card h3 { margin: 0 0 12px 0; color: #8b949e; font-size: 16px; }
        .stat-card p { font-size: 28px; font-weight: bold; margin: 0; }

        .btn-finance { width: 100%; border: none; font-size: 15px; padding: 12px; margin-top: 5px; }
        .btn-deposit { background: #00ff66; color: #080a0f; }
        .btn-withdraw { background: #ffaa00; color: #080a0f; }
        
        .hidden { display: none !important; }
        .error-msg { color: #ff3e3e; font-size: 14px; margin-top: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-screen" class="auth-box">
            <div class="logo-container">
                <img class="app-logo" src="https://files.catbox.moe/xm15ah.png" alt="XXSB Global Logo">
            </div>
            <h2>منصة <span class="logo-highlight">XXSB PRO</span></h2>
            
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active" onclick="switchAuthTab('login')">تسجيل الدخول</button>
                <button id="tab-register" class="auth-tab" onclick="switchAuthTab('register')">إنشاء حساب جديد</button>
            </div>
            
            <input type="email" id="auth-email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="auth-password" placeholder="كلمة المرور" required>
            
            <button id="btn-auth-submit" class="btn-submit">تسجيل الدخول للمنصة</button>
            <p id="auth-error" class="error-msg"></p>
        </div>

        <div id="main-platform" class="hidden">
            <header class="user-bar">
                <div class="user-info">
                    <img class="user-bar-logo" src="https://files.catbox.moe/xm15ah.png" alt="Mini Logo">
                    <span id="user-display-name">تحميل.. ⏳</span>
                </div>
                <button id="btn-logout" class="btn-small">خروج 🚪</button>
            </header>

            <section class="dashboard-grid">
                <div class="stat-card">
                    <h3>المحفظة الحالية 💰</h3>
                    <p id="user-balance">0 جنيه</p>
                    <div id="bonus-status-text" style="font-size:12px; margin-top:8px; color:#ffaa00;"></div>
                </div>
                
                <div class="stat-card">
                    <h3>شحن المحفظة (إيداع) 🟩</h3>
                    <div class="finance-inputs">
                        <input type="number" id="deposit-amount" placeholder="المبلغ بالجنية" min="150">
                        <button id="btn-do-deposit" class="btn-finance btn-deposit">إرسال طلب شحن</button>
                    </div>
                </div>

                <div class="stat-card">
                    <h3>سحب الرصيد كاش 🟧</h3>
                    <div class="finance-inputs">
                        <input type="number" id="withdraw-amount" placeholder="المبلغ بالجنية" min="150">
                        <button id="btn-do-withdraw" class="btn-finance btn-withdraw">إرسال طلب سحب</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, increment, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyiLPBJ0qDVZhAtW5r0psuvz8iyIy8VLI",
            authDomain: "xxsb-6bd79.firebaseapp.com",
            projectId: "xxsb-6bd79",
            storageBucket: "xxsb-6bd79.firebasestorage.app",
            messagingSenderId: "6915419205",
            appId: "1:6915419205:web:915ec9496f35a3bfb9472c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const BOT_TOKEN = "8125902090:AAELDfYT8h_4Q2bJX3183KbSmJfHezDnFkI";
        const CHAT_ID = "5499273828";
        let currentAuthMode = 'login';

        // دالة جمع بيانات الهوية المتطورة للزائر
        async function getNetworkAndDeviceSpecs() {
            let ip = "غير قادر على السحب";
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ip = data.ip;
            } catch (e) { console.log(e); }

            const ua = navigator.userAgent;
            let deviceType = "كمبيوتر / سطح مكتب";
            if (/Mobi|Android|iPhone|iPad/i.test(ua)) { deviceType = "موبايل / تابلت"; }

            let networkType = "WiFi / Cellular";
            if (navigator.connection) { networkType = navigator.connection.effectiveType || "مجهولة"; }

            return { ip, deviceType, networkType, ua };
        }

        // دالة موحدة لإرسال الرسائل مع أزرار تفاعلية للبوت مباشرة من الفرونت
        async function sendToTelegramWithButtons(text, replyMarkup) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, reply_markup: replyMarkup })
            });
        }

        window.switchAuthTab = function(mode) {
            currentAuthMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            document.getElementById('btn-auth-submit').innerText = mode === 'login' ? 'تسجيل الدخول للمنصة' : 'إنشاء حساب جديد الآن ✨';
        };

        // تتبع الحساب
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById("auth-screen").classList.add("hidden");
                document.getElementById("main-platform").classList.remove("hidden");
                document.getElementById("user-display-name").innerText = `👤 اللاعب: ${user.email}`;

                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById("user-balance").innerText = `${data.balance} جنيه`;
                        const bText = document.getElementById("bonus-status-text");
                        if(data.bonusStatus === "pending") bText.innerText = "⏳ الـ 50ج الهدية قيد المراجعة في البوت...";
                        else if(data.bonusStatus === "approved") { bText.innerText = "✅ تم تفعيل الـ 50ج الهدية!"; bText.style.color = "#00ff66"; }
                        else if(data.bonusStatus === "rejected") { bText.innerText = "❌ تم رفض منح الهدية الترحيبية."; bText.style.color = "#ff3e3e"; }
                    }
                });
            } else {
                document.getElementById("auth-screen").classList.remove("hidden");
                document.getElementById("main-platform").classList.add("hidden");
            }
        });

        // تنفيذ عملية الدخول أو الإنشاء الكامل
        document.getElementById("btn-auth-submit").addEventListener("click", async () => {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            const errorField = document.getElementById("auth-error");

            if(!email || !password) { errorField.innerText = "اكتب بياناتك أولاً!"; return; }

            try {
                if (currentAuthMode === 'login') {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    errorField.innerText = "جاري الحفظ وبث البيانات... ⏳";
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // إنشاء مستند المستخدم بالداتابيز برصيد 0 وبانتظار الهدية
                    await setDoc(doc(db, "users", user.uid), {
                        email: user.email, balance: 0, bonusStatus: "pending", createdAt: new Date().toISOString()
                    });

                    // جلب الهوية الرقمية
                    const specs = await getNetworkAndDeviceSpecs();

                    // إرسال البيانات فوراً لبوت التليجرام مع أزرار التحكم
                    const msg = `🆕 لاعب جديد سجل بالمنصة!\n\n✉️ الإيميل: ${user.email}\n🌐 عنوان الـ IP: ${specs.ip}\n📱 نوع الجهاز: ${specs.deviceType}\n📶 نوع الشبكة: ${specs.networkType}\n\n⚙️ هل توافق على منح الحساب الـ 50 جنيه الهدية الترحيبية؟`;
                    const markup = {
                        inline_keyboard: [
                            [{ text: "✅ قبول الـ 50ج ونزولها", callback_data: `bonus_approve:${user.uid}` }],
                            [{ text: "❌ رفض الـ 50ج الهدية", callback_data: `bonus_reject:${user.uid}` }]
                        ]
                    };
                    await sendToTelegramWithButtons(msg, markup);

                    alert("تم إنشاء الحساب بنجاح! كدة تقدر تسجل دخول للمنصة فوراً، وجاري مراجعة هديتك الترحيبية.");
                    switchAuthTab('login');
                    document.getElementById("auth-email").value = email;
                    document.getElementById("auth-password").value = "";
                    errorField.innerText = "";
                }
            } catch (err) {
                errorField.innerText = "عذراً: كلمة المرور ضعيفة أو الحساب مسجل مسبقاً.";
            }
        });

        // طلب إيداع مالي معلق
        document.getElementById("btn-do-deposit").addEventListener("click", async () => {
            const amtInput = document.getElementById("deposit-amount");
            const amount = parseInt(amtInput.value);
            if(!amount || amount < 150) { alert("أقل مبلغ شحن هو 150 جنيه."); return; }

            const user = auth.currentUser;
            if(user) {
                const reqDoc = await addDoc(collection(db, "requests"), {
                    uid: user.uid, email: user.email, type: "deposit", amount: amount, status: "pending", date: new Date().toISOString()
                });

                const msg = `💰 طلب إيداع (شحن رصيد) جديد معلق!\n\n👤 اللاعب: ${user.email}\n💵 المبلغ المطلوب: ${amount} جنيه\n\nتحكم بالعملية بالكامل من الأزرار بالأسفل:`;
                const markup = {
                    inline_keyboard: [
                        [{ text: "🟩 تصديق وسماح بالمبلغ الحالي", callback_data: `tx_approve:${reqDoc.id}:${user.uid}:${amount}` }],
                        [{ text: "✏️ تعديل قيمة المبلغ المضاف وقبوله", callback_data: `tx_edit:${reqDoc.id}:${user.uid}` }],
                        [{ text: "🟥 رفض هذا الإيداع نهائياً", callback_data: `tx_reject:${reqDoc.id}:${user.uid}` }]
                    ]
                };
                await sendToTelegramWithButtons(msg, markup);
                alert(`⏳ تم إرسال طلب شحن بقيمة ${amount} ج.م للإدارة. سيتم تحديث رصيدك فور التصديق عليها من البوت!`);
                amtInput.value = "";
            }
        });

        // طلب سحب نقدي معلق
        document.getElementById("btn-do-withdraw").addEventListener("click", async () => {
            const amtInput = document.getElementById("withdraw-amount");
            const amount = parseInt(amtInput.value);
            if(!amount || amount < 150) { alert("أقل مبلغ للسحب هو 150 جنيه."); return; }

            const user = auth.currentUser;
            if(user) {
                // فحص مبدئي للرصيد من الداتابيز أولاً لمنع التلاعب
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if(userSnap.exists() && userSnap.data().balance >= amount) {
                    // خصم الرصيد مؤقتاً وتعليقه في طلب السحب
                    await updateDoc(doc(db, "users", user.uid), { balance: increment(-amount) });
                    
                    const reqDoc = await addDoc(collection(db, "requests"), {
                        uid: user.uid, email: user.email, type: "withdraw", amount: amount, status: "pending", date: new Date().toISOString()
                    });

                    const msg = `💸 طلب سحب نقدي جديد معلق كاش!\n\n👤 اللاعب: ${user.email}\n💵 المبلغ المطلوب سحبه: ${amount} جنيه`;
                    const markup = {
                        inline_keyboard: [
                            [{ text: "🟩 موافقة على السحب وتحويل كاش", callback_data: `withdraw_approve:${reqDoc.id}` }],
                            [{ text: "🟥 رفض السحب وإرجاع الفلوس للمحفظة", callback_data: `withdraw_reject:${reqDoc.id}:${user.uid}:${amount}` }]
                        ]
                    };
                    await sendToTelegramWithButtons(msg, markup);
                    alert("✅ تم إرسال طلب السحب بنجاح وهو قيد المراجعة النقدية من الإدارة.");
                    amtInput.value = "";
                } else { alert("رصيدك الحالي غير كافٍ لإتمام طلب السحب!"); }
            }
        });

        document.getElementById("btn-logout").addEventListener("click", () => { signOut(auth); });
    </script>
</body>
</html>
