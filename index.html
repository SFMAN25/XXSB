<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XXSB - Control Panel</title>
    <style>
        /* ستايل المنصة المظلم بنقاوة النيون */
        body {
            background-color: #0d0f12;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .auth-box {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 12px;
            max-width: 400px;
            margin: 80px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            text-align: center;
        }
        .auth-box input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background: #0d0f12;
            border: 1px solid #30363d;
            color: white;
            border-radius: 6px;
            text-align: center;
            font-size: 16px;
        }
        .auth-buttons { display: flex; justify-content: space-around; margin-top: 15px; }
        
        /* فواصل لتنظيم الواجهة */
        .divider {
            margin: 20px 0;
            color: #8b949e;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            background: #30363d;
            height: 1px;
            margin: 0 10px;
        }

        button { cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 15px; transition: 0.2s; }
        .btn-primary { background: #00ff66; color: #0d0f12; border: none; padding: 12px 25px; }
        .btn-primary:hover { background: #00cc52; }
        .btn-secondary { background: transparent; color: #00ff66; border: 1px solid #00ff66; padding: 12px 20px; }
        .btn-secondary:hover { background: rgba(0, 255, 102, 0.1); }
        
        /* زرار جوجل الجديد */
        .btn-google {
            width: 96%;
            background: #ffffff;
            color: #1f2328;
            border: none;
            padding: 12px;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 auto;
        }
        .btn-google:hover { background: #f6f8fa; }

        .btn-small { background: #ff3e3e; color: white; border: none; padding: 6px 12px; font-size: 13px; }
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #161b22;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }
        .logo-highlight { color: #ff3e3e; text-shadow: 0 0 10px #ff3e3e; }
        .dashboard { display: flex; justify-content: space-around; margin-top: 30px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 8px; width: 42%; text-align: center; }
        .card h3 { margin-top: 0; color: #8b949e; }
        .card p, .card div { font-size: 24px; font-weight: bold; margin: 10px 0 0 0; }
        .status.active { color: #00ff66; text-shadow: 0 0 5px #00ff66; }
        .hidden { display: none; }
        .error-msg { color: #ff3e3e; font-size: 14px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="auth-screen" class="auth-box">
            <h2>منصة <span class="logo-highlight">XXSB</span></h2>
            <p>المراهنة الذكية بين الصحاب</p>
            
            <input type="email" id="auth-email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="auth-password" placeholder="كلمة المرور" required>
            
            <div class="auth-buttons">
                <button id="btn-login" class="btn-primary">دخول</button>
                <button id="btn-register" class="btn-secondary">إنشاء حساب</button>
            </div>

            <div class="divider">أو يمكنك التسجيل عبر</div>

            <button id="btn-google" class="btn-google">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google">
                الدخول بواسطة Google
            </button>

            <p id="auth-error" class="error-msg"></p>
        </div>

        <div id="main-platform" class="hidden">
            <header class="user-bar">
                <span id="user-display-name">جاري تحميل البيانات.. ⏳</span>
                <button id="btn-logout" class="btn-small">خروج 🚪</button>
            </header>

            <center>
                <h1>لوحة تحكم المنصة <span class="logo-highlight">XXSB</span></h1>
            </center>

            <section class="dashboard">
                <div class="card">
                    <h3>رصيد محفظتك 💰</h3>
                    <p id="user-balance">0 جنيه</p>
                </div>
                <div class="card">
                    <h3>حالة اتصالك بالسيرفر</h3>
                    <div id="room-status" class="status active">متصل بنجاح 🟢</div>
                </div>
            </section>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut,
            GoogleAuthProvider,
            signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // الـ Configuration المحدثة بتاعتك
        const firebaseConfig = {
            apiKey: "AIzaSyCyiLPBJ0qDVZhAtW5r0psuvz8iyIy8VLI",
            authDomain: "xxsb-6bd79.firebaseapp.com",
            projectId: "xxsb-6bd79",
            storageBucket: "xxsb-6bd79.firebasestorage.app",
            messagingSenderId: "6915419205",
            appId: "1:6915419205:web:915ec9496f35a3bfb9472c",
            measurementId: "G-QV7BZPPCPK"
        };

        // تهيئة الـ Services
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // تجهيز ميزود جوجل
        const googleProvider = new GoogleAuthProvider();

        // عناصر الواجهة
        const authScreen = document.getElementById("auth-screen");
        const mainPlatform = document.getElementById("main-platform");
        const emailInput = document.getElementById("auth-email");
        const passwordInput = document.getElementById("auth-password");
        const errorMsg = document.getElementById("auth-error");

        // ================= 🔄 مراقبة الجلسة والتحقق من المحفظة =================
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                authScreen.classList.add("hidden");
                mainPlatform.classList.remove("hidden");
                document.getElementById("user-display-name").innerText = `👤 اللاعب: ${user.email || user.displayName}`;
                errorMsg.innerText = "";

                const userDocRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userDocRef);

                // لو الحساب جديد (سواء بجوجل أو إيميل)، بنأسس محفظته بـ 5000 جنيه كاش تجريبي
                if (!userSnap.exists()) {
                    await setDoc(userDocRef, {
                        email: user.email,
                        displayName: user.displayName || "",
                        balance: 5000,
                        vipStatus: false,
                        totalWagered: 0
                    });
                }

                // مراقبة المحفظة لايف
                onSnapshot(userDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        document.getElementById("user-balance").innerText = `${docSnap.data().balance} جنيه`;
                    }
                });

            } else {
                authScreen.classList.remove("hidden");
                mainPlatform.classList.add("hidden");
            }
        });

        // ================= 🌐 الـ Logic الخاص بـ زرار Google =================
        document.getElementById("btn-google").addEventListener("click", async () => {
            try {
                await signInWithPopup(auth, googleProvider);
            } catch (err) {
                errorMsg.innerText = `فشل تسجيل الدخول بجوجل: ${err.message}`;
            }
        });

        // ================= 📝 الـ Logic الخاص بالإيميل والباسورد =================
        document.getElementById("btn-register").addEventListener("click", async () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            if(!email || !password) { errorMsg.innerText = "املا البيانات الأول يا هندسة!"; return; }
            try {
                await createUserWithEmailAndPassword(auth, email, password);
            } catch (err) {
                errorMsg.innerText = `عفواً: الباسورد ضعيف أو الحساب مسجل بالفعل!`;
            }
        });

        document.getElementById("btn-login").addEventListener("click", async () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            if(!email || !password) { errorMsg.innerText = "اكتب الإيميل والباسورد!"; return; }
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                errorMsg.innerText = "خطأ في البيانات، تأكد من الإيميل والباسورد!";
            }
        });

        document.getElementById("btn-logout").addEventListener("click", () => {
            signOut(auth);
        });
    </script>
</body>
</html>
